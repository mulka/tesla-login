<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesla Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .logo {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      margin-bottom: 3rem;
      text-transform: uppercase;
    }

    .qr-wrapper {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      display: inline-block;
      margin-bottom: 2.5rem;
      box-shadow: 0 0 60px rgba(255, 255, 255, 0.06);
    }

    .qr-wrapper img {
      display: block;
      width: 280px;
      height: 280px;
    }

    .scan-text {
      font-size: 1.4rem;
      font-weight: 500;
      color: #e0e0e0;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }

    .sub-text {
      font-size: 0.95rem;
      color: #666;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Tesla</div>
    <div class="qr-wrapper">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=https://tesla.com/login" alt="QR Code">
    </div>
    <div class="scan-text">Scan to Log In</div>
    <div class="sub-text">Use the Tesla app on your phone to scan this code</div>
    <div style="margin-top:2.5rem;">
      <a href="passkeys.html" style="display:inline-block;color:#3e82f7;text-decoration:none;font-size:0.9rem;letter-spacing:0.02em;">What are passkeys? →</a>
      <br>
      <a href="webauthn-demo.html" style="display:inline-block;color:#3e82f7;text-decoration:none;font-size:0.9rem;letter-spacing:0.02em;margin-top:0.6rem;">Try the WebAuthn demo →</a>
      <br>
      <a href="ble-test.html" style="display:inline-block;color:#3e82f7;text-decoration:none;font-size:0.9rem;letter-spacing:0.02em;margin-top:0.6rem;">⚡ BLE capability test →</a>
    </div>
  </div>


</body>
</html>
